<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ COMMAND | Executive Boardroom</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Inter:wght@300;400;600&display=swap');
        
        :root {
            --bordo: #B22222;
            --bg-dark: #050505;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #F4F4F5; 
            font-family: 'Inter', sans-serif;
            margin: 0;
            background-image: radial-gradient(circle at 20% 20%, rgba(178, 34, 34, 0.05) 0%, transparent 40%);
        }

        /* --- NAVIGATION HORIZONTALE (STYLE SLIDE) --- */
        nav.top-nav {
            background: rgba(5, 5, 5, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .nav-link {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 11px;
            font-weight: 800;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: #71717A;
            padding: 25px 20px;
            transition: 0.3s;
            cursor: pointer;
            border-bottom: 3px solid transparent;
        }

        .nav-link:hover, .nav-link.active {
            color: white;
            border-bottom: 3px solid var(--bordo);
        }

        /* --- STYLE DES PAGES (CONFORME AUX SLIDES) --- */
        .slide-title {
            font-family: 'Plus Jakarta Sans', sans-serif;
            font-size: 42px;
            font-weight: 800;
            text-transform: uppercase;
            border-left: 8px solid var(--bordo);
            padding-left: 25px;
            margin-bottom: 40px;
            letter-spacing: -1px;
        }

        .tile {
            background-color: #0A0A0A;
            border: 1px solid #1A1A1A;
            border-radius: 20px;
            padding: 35px;
            transition: 0.3s;
        }

        .tile:hover {
            border-color: var(--bordo);
        }

        .accent { color: var(--bordo); }

        .btn-mod {
            border: 1px solid #333;
            border-radius: 4px;
            color: #555;
            cursor: pointer;
            font-size: 10px;
            padding: 4px 10px;
            text-transform: uppercase;
            font-weight: 800;
        }

        .btn-mod:hover { border-color: var(--bordo); color: var(--bordo); }

        /* --- TABLE STYLE --- */
        table { width: 100%; border-collapse: collapse; }
        th { background: rgba(178, 34, 34, 0.05); color: var(--bordo); font-size: 12px; text-transform: uppercase; padding: 20px; text-align: left; }
        td { border-bottom: 1px solid #1A1A1A; padding: 20px; color: #E4E4E7; font-size: 15px; }

        .animate-fade { animation: fadeIn 0.6s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* Timeline Style */
        .timeline-line { background: #1A1A1A; height: 4px; width: 100%; position: relative; top: 12px; }
        .dot { width: 20px; height: 20px; background: var(--bordo); border-radius: 50%; border: 4px solid #050505; }
    </style>
</head>
<body>

    <nav class="top-nav flex items-center justify-between px-12">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-[#B22222] rounded flex items-center justify-center font-black italic text-white text-lg">V</div>
            <span class="text-[10px] font-black tracking-widest uppercase">Vibz Command</span>
        </div>
        <div class="flex">
            <div class="nav-link active" onclick="loadPage('dash', this)">Stratégie</div>
            <div class="nav-link" onclick="loadPage('staff', this)">Staff (7 Postes)</div>
            <div class="nav-link" onclick="loadPage('finance', this)">Finances CRUD</div>
            <div class="nav-link" onclick="loadPage('tournee', this)">Tournée</div>
            <div class="nav-link" onclick="loadPage('boardroom', this)">Boardroom Chat</div>
        </div>
        <div class="text-[10px] font-bold text-stone-500 uppercase tracking-widest">
            CEO Session: <span class="text-green-500" id="clock">--:--</span>
        </div>
    </nav>

    <main id="view-container" class="max-w-7xl mx-auto py-16 px-6">
        </main>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadPage(page, el) {
            const container = document.getElementById('view-container');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');

            if(page === 'dash') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Architecture du Hub <span class="accent">Stratégique</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        <div class="tile"><h3>Trésorerie</h3><p class="text-3xl font-black mt-4 accent">--- FCFA</p></div>
                        <div class="tile border-b-4 border-red-800"><h3>Inscrits Tournée</h3><p id="t-count" class="text-3xl font-black mt-4">...</p></div>
                        <div class="tile"><h3>Status Production</h3><p class="text-3xl font-black mt-4">ACTIVE</p></div>
                    </div>
                </div>`;
                db.ref('registrations_tournee').on('value', s => {
                    document.getElementById('t-count').innerText = s.val() ? Object.keys(s.val()).length : 0;
                });
            }

            if(page === 'staff') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Synergie des <span class="accent">7 Postes Clés</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 uppercase mb-6 italic">Outils Opérationnels</h3>
                            ${['Assistante Exécutive', 'Direction Artistique', 'Technique Vidéo', 'Post-Production', 'Logistique', 'Comptabilité', 'Management'].map(role => `
                                <div class="flex justify-between items-center py-4 border-b border-white/5">
                                    <span class="text-sm font-bold uppercase tracking-tighter">${role}</span>
                                    <div class="flex gap-2"><div class="btn-mod">Éditer</div><div class="btn-mod">Logs</div></div>
                                </div>
                            `).join('')}
                        </div>
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 uppercase mb-6 italic">Modification RH (CRUD)</h3>
                            <div class="space-y-4">
                                <input type="text" placeholder="Nom complet..." class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-sm outline-none focus:border-red-800">
                                <select class="w-full bg-black border border-white/10 p-4 rounded-xl text-sm uppercase font-bold"><option>Rôle</option><option>Montage</option></select>
                                <button class="w-full bg-red-900/20 text-red-500 border border-red-900/50 p-4 rounded-xl font-black text-[10px] uppercase tracking-widest hover:bg-red-900/40 transition">Mettre à jour le Staff</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            if(page === 'finance') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Suite Financière <span class="accent">Intégrée</span></h2>
                    <div class="tile overflow-hidden p-0">
                        <table>
                            <thead><tr><th>Catégorie</th><th>Budget Prévu</th><th>Réel</th><th>Status</th><th>Actions</th></tr></thead>
                            <tbody>
                                <tr><td>Tournée Découverte 2026</td><td>4.500.000 F</td><td>3.850.000 F</td><td class="text-green-500 font-bold uppercase text-[10px]">Optimisé</td><td><div class="btn-mod">Modifier</div></td></tr>
                                <tr><td>Production Podcasts</td><td>1.200.000 F</td><td>1.450.000 F</td><td class="text-red-500 font-bold uppercase text-[10px]">Alerte</td><td><div class="btn-mod">Modifier</div></td></tr>
                                <tr><td>RH & Staff</td><td>2.800.000 F</td><td>2.800.000 F</td><td class="text-blue-500 font-bold uppercase text-[10px]">Stable</td><td><div class="btn-mod">Modifier</div></td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }

            if(page === 'tournee') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Contrôle Flux <span class="accent">Tournée</span></h2>
                    <div class="flex justify-between mt-20 relative">
                        <div class="absolute w-full timeline-line"></div>
                        ${['Sotouboua', 'Sokodé', 'Kara', 'Mango', 'Dapaong'].map(v => `
                            <div class="z-10 text-center">
                                <div class="dot mx-auto mb-4"></div>
                                <h3 class="text-sm font-black uppercase italic">${v}</h3>
                                <p class="text-[9px] text-stone-500 font-bold uppercase mt-2">Paramétrer</p>
                            </div>
                        `).join('')}
                    </div>
                    <div class="mt-20 p-8 bg-red-900/5 border border-red-900/20 rounded-2xl text-center">
                        <p class="text-stone-400 italic">Interface de gestion logistique pour chaque étape de la tournée.</p>
                    </div>
                </div>`;
            }

            if(page === 'boardroom') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Executive <span class="accent">Boardroom Chat</span></h2>
                    <div class="tile h-[500px] flex flex-col p-0 overflow-hidden">
                        <div id="c-box" class="flex-grow p-8 space-y-6 overflow-y-auto"></div>
                        <div class="p-6 bg-black border-t border-white/5 flex gap-4">
                            <input type="text" id="c-in" placeholder="Directive exécutive..." class="flex-grow bg-white/5 border border-white/10 p-4 rounded-xl text-sm outline-none italic">
                            <button onclick="sendMsg()" class="bg-red-800 px-10 rounded-xl font-black uppercase text-[10px] tracking-widest">Lancer</button>
                        </div>
                    </div>
                </div>`;
                syncChat();
            }
        }

        // --- FIREBASE FUNCTIONS ---
        function sendMsg() {
            const input = document.getElementById('c-in');
            if(!input.value) return;
            db.ref('internal_chat').push({ u: "C. BONSAH (CEO)", m: input.value, t: Date.now() });
            input.value = "";
        }

        function syncChat() {
            db.ref('internal_chat').limitToLast(20).on('value', s => {
                const box = document.getElementById('c-box'); box.innerHTML = "";
                if(s.val()) {
                    Object.values(s.val()).forEach(m => {
                        const isMe = m.u.includes("CEO");
                        box.innerHTML += `
                            <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                                <span class="text-[8px] font-black uppercase text-stone-600 mb-1">${m.u}</span>
                                <div class="px-5 py-3 rounded-2xl text-xs ${isMe ? 'bg-red-900/20 text-white border border-red-900/30 italic' : 'bg-zinc-900 text-stone-400 border border-white/5'} max-w-lg">
                                    ${m.m}
                                </div>
                            </div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        setInterval(() => {
            document.getElementById('clock').innerText = new Date().toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        loadPage('dash');
    </script>
</body>
</html>
