<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ COMMAND | Executive Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bordo-primary: #B22222;
            --bordo-light: #E53935;
            --bg-dark: #050505;
        }

        body { 
            background-color: var(--bg-dark); 
            color: #f4f4f5; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            letter-spacing: -0.02em;
        }

        .glass-panel {
            background: rgba(18, 18, 18, 0.7);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
        }

        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
            margin: 4px 12px;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(178, 34, 34, 0.1);
            color: white;
        }

        .sidebar-item.active {
            border-left: 4px solid var(--bordo-primary);
        }

        .stat-card {
            background: linear-gradient(145deg, rgba(20,20,20,1) 0%, rgba(10,10,10,1) 100%);
            border: 1px solid rgba(255,255,255,0.03);
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-5px);
            border-color: rgba(178, 34, 34, 0.3);
        }

        .bordo-gradient {
            background: linear-gradient(135deg, var(--bordo-primary), #7A1B1B);
        }

        /* Scrollbar personnalisée style moderne */
        ::-webkit-scrollbar { width: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #222; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--bordo-primary); }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="flex h-screen overflow-hidden">

    <aside class="w-72 flex flex-col border-r border-white/5 py-8">
        <div class="px-8 mb-12 flex items-center gap-3">
            <div class="w-10 h-10 bordo-gradient rounded-xl flex items-center justify-center shadow-lg shadow-red-900/20">
                <span class="font-black italic text-white text-xl">V</span>
            </div>
            <div>
                <h1 class="text-sm font-extrabold tracking-tight">VIBZ COMMAND</h1>
                <p class="text-[9px] text-stone-500 uppercase font-bold tracking-widest">Enterprise Edition</p>
            </div>
        </div>

        <nav class="flex-grow space-y-1">
            <div class="sidebar-item active p-4 cursor-pointer flex items-center gap-4 text-stone-400" onclick="loadModule('dash')">
                <span class="text-lg">📊</span> <span class="text-sm font-semibold">Vue d'ensemble</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4 text-stone-400" onclick="loadModule('tasks')">
                <span class="text-lg">🎯</span> <span class="text-sm font-semibold">Missions Équipe</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4 text-stone-400" onclick="loadModule('chat')">
                <span class="text-lg">💬</span> <span class="text-sm font-semibold">Salle de Réunion</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4 text-stone-400" onclick="loadModule('finance')">
                <span class="text-lg">💳</span> <span class="text-sm font-semibold">Finances & RH</span>
            </div>
        </nav>

        <div class="mx-6 p-4 glass-panel mt-auto">
            <div class="flex items-center gap-3">
                <div class="w-8 h-8 rounded-full bg-stone-800 border border-white/10 overflow-hidden">
                    <img src="https://ui-avatars.com/api/?name=Christian+Bonsah&background=B22222&color=fff" alt="User">
                </div>
                <div class="overflow-hidden">
                    <p class="text-[11px] font-bold truncate">C. BONSAH</p>
                    <p class="text-[9px] text-red-500 font-bold uppercase">CEO & Admin</p>
                </div>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col bg-[#020202]">
        <header class="h-24 px-12 flex items-center justify-between">
            <h2 id="module-title" class="text-2xl font-extrabold italic">Dashboard Global</h2>
            <div class="flex items-center gap-4">
                <div class="bg-stone-900/50 px-4 py-2 rounded-full border border-white/5 text-[10px] font-bold text-stone-400 uppercase tracking-widest">
                    Status: <span class="text-green-500">Live</span>
                </div>
                <button class="w-10 h-10 rounded-full border border-white/5 flex items-center justify-center hover:bg-white/5 transition">🔔</button>
            </div>
        </header>

        <section id="main-view" class="flex-grow px-12 pb-12 overflow-y-auto animate-fade">
            </section>
    </main>

    <script>
        // Config Firebase (Identique à ton site public pour la synchronisation)
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadModule(name) {
            const view = document.getElementById('main-view');
            const title = document.getElementById('module-title');
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            event.currentTarget.classList.add('active');

            if(name === 'dash') {
                title.innerText = "Dashboard Global";
                view.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        <div class="stat-card p-8 rounded-3xl">
                            <p class="text-stone-500 text-[10px] font-bold uppercase tracking-widest mb-4">Trésorerie Disponible</p>
                            <h3 class="text-3xl font-black italic">--- <span class="text-xs text-stone-600">FCFA</span></h3>
                        </div>
                        <div class="stat-card p-8 rounded-3xl border-b-4 border-red-800">
                            <p class="text-stone-500 text-[10px] font-bold uppercase tracking-widest mb-4">Candidatures Tournée</p>
                            <h3 id="dash-tournee-count" class="text-3xl font-black italic">0</h3>
                        </div>
                        <div class="stat-card p-8 rounded-3xl">
                            <p class="text-stone-500 text-[10px] font-bold uppercase tracking-widest mb-4">Projets en Production</p>
                            <h3 class="text-3xl font-black italic">14</h3>
                        </div>
                    </div>
                    <div class="glass-panel p-8">
                        <h4 class="text-sm font-bold uppercase mb-6 text-stone-400 tracking-widest italic underline decoration-red-800">Derniers Événements</h4>
                        <div id="activity-log" class="space-y-4">
                            <p class="text-xs text-stone-600">Chargement des données en temps réel...</p>
                        </div>
                    </div>
                `;
                // Récupération dynamique
                db.ref('registrations_tournee').on('value', s => {
                    document.getElementById('dash-tournee-count').innerText = s.val() ? Object.keys(s.val()).length : 0;
                });
            }

            if(name === 'chat') {
                title.innerText = "Salle de Réunion";
                view.innerHTML = `
                    <div class="flex flex-col h-full glass-panel overflow-hidden">
                        <div id="chat-box" class="flex-grow p-8 overflow-y-auto space-y-4 bg-stone-900/10"></div>
                        <div class="p-6 border-t border-white/5 flex gap-4 bg-stone-900/30">
                            <input type="text" id="chat-input" placeholder="Note pour l'équipe..." class="flex-grow bg-white/5 border border-white/10 rounded-2xl px-6 py-4 outline-none focus:border-red-800 transition text-sm">
                            <button onclick="sendMessage()" class="bordo-gradient px-8 rounded-2xl font-black uppercase text-[10px] tracking-widest shadow-lg shadow-red-900/20">Envoyer</button>
                        </div>
                    </div>
                `;
                loadChat();
            }

            if(name === 'tasks') {
                title.innerText = "Missions de l'Équipe";
                view.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8 h-full">
                        <div class="glass-panel p-8">
                            <h4 class="font-black uppercase text-xs mb-8 text-stone-500">Missions Actives</h4>
                            <div id="task-list" class="space-y-4">
                                <div class="p-4 bg-white/5 rounded-xl border-l-4 border-blue-500">
                                    <p class="text-[9px] font-bold text-blue-400 uppercase mb-1">Technique</p>
                                    <p class="text-sm font-bold">Préparation matériel Kara</p>
                                </div>
                            </div>
                        </div>
                        <div class="glass-panel p-8 bg-gradient-to-t from-red-900/5 to-transparent">
                            <h4 class="font-black uppercase text-xs mb-8 text-stone-500 italic">Assigner une Mission</h4>
                            <div class="space-y-4">
                                <input type="text" id="task-title" placeholder="Titre de la mission..." class="w-full bg-white/5 border border-white/10 rounded-xl p-4 text-sm outline-none focus:border-red-800">
                                <select id="task-user" class="w-full bg-stone-900 border border-white/10 rounded-xl p-4 text-sm outline-none">
                                    <option>Choisir un membre</option>
                                    <option>Assistante</option>
                                    <option>Technicien</option>
                                    <option>Monteur</option>
                                </select>
                                <button class="w-full bordo-gradient py-4 rounded-xl font-black uppercase text-[10px] tracking-widest">Lancer la mission</button>
                            </div>
                        </div>
                    </div>
                `;
            }
        }

        // --- MOTEUR CHAT TEMPS RÉEL ---
        function sendMessage() {
            const input = document.getElementById('chat-input');
            if(input.value.trim() === "") return;
            db.ref('internal_chat').push({
                user: "C. BONSAH",
                msg: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function loadChat() {
            db.ref('internal_chat').limitToLast(20).on('value', s => {
                const box = document.getElementById('chat-box');
                box.innerHTML = "";
                const data = s.val();
                if(data) {
                    Object.values(data).forEach(m => {
                        const isMe = m.user === "C. BONSAH";
                        box.innerHTML += `
                            <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                                <span class="text-[8px] font-black uppercase text-stone-500 mb-1">${m.user}</span>
                                <div class="px-4 py-3 rounded-2xl text-xs max-w-sm ${isMe ? 'bg-red-900/20 border border-red-900/30 text-white italic' : 'bg-stone-800 text-stone-300'}">
                                    ${m.msg}
                                </div>
                            </div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        // Init au chargement
        loadModule('dash');
    </script>
</body>
</html>
