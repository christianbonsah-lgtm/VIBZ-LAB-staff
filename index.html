<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ COMMAND | Executive Suite</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --bordo: #B22222;
            --bg-dark: #050505;
            --glass: rgba(18, 18, 18, 0.75);
        }

        body { 
            background-color: var(--bg-dark); 
            color: #f4f4f5; 
            font-family: 'Plus Jakarta Sans', sans-serif;
            overflow: hidden;
        }

        .glass {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .sidebar-item {
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border-radius: 12px;
        }

        .sidebar-item:hover, .sidebar-item.active {
            background: rgba(178, 34, 34, 0.15);
            color: white;
            border-left: 4px solid var(--bordo);
        }

        .card-executive {
            background: linear-gradient(145deg, #0f0f0f 0%, #050505 100%);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 2rem;
            transition: 0.3s;
        }

        .card-executive:hover {
            border-color: var(--bordo);
            transform: translateY(-5px);
        }

        .input-executive {
            background: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 12px;
            padding: 12px 16px;
            color: white;
            outline: none;
            transition: 0.3s;
        }

        .input-executive:focus {
            border-color: var(--bordo);
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-bordo {
            background: linear-gradient(135deg, #B22222, #7A1B1B);
            color: white;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 12px;
            transition: 0.3s;
        }

        .btn-bordo:hover {
            box-shadow: 0 10px 20px rgba(178, 34, 34, 0.3);
            transform: scale(1.02);
        }

        /* Scrollbar */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--bordo); border-radius: 10px; }
    </style>
</head>
<body class="flex h-screen">

    <!-- SIDEBAR -->
    <aside class="w-80 flex flex-col border-r border-white/5 bg-black py-8">
        <div class="px-8 mb-12 flex items-center gap-4">
            <div class="w-12 h-12 bg-[#B22222] rounded-2xl flex items-center justify-center shadow-2xl shadow-red-900/40">
                <span class="text-2xl font-black italic">V</span>
            </div>
            <div>
                <h1 class="text-lg font-black tracking-tighter">VIBZ COMMAND</h1>
                <p class="text-[9px] text-stone-500 font-bold uppercase tracking-[0.2em]">Enterprise Hub</p>
            </div>
        </div>

        <nav class="flex-grow space-y-2 px-4">
            <div class="sidebar-item active p-4 cursor-pointer flex items-center gap-4" onclick="loadModule('dash')">
                <span class="text-xl">🏛️</span> <span class="text-sm font-bold uppercase tracking-wide">Vue Stratégique</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4" onclick="loadModule('staff')">
                <span class="text-xl">👥</span> <span class="text-sm font-bold uppercase tracking-wide">Gestion Staff</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4" onclick="loadModule('finance')">
                <span class="text-xl">📊</span> <span class="text-sm font-bold uppercase tracking-wide">Trésorerie / RH</span>
            </div>
            <div class="sidebar-item p-4 cursor-pointer flex items-center gap-4" onclick="loadModule('chat')">
                <span class="text-xl">💬</span> <span class="text-sm font-bold uppercase tracking-wide">Boardroom Chat</span>
            </div>
        </nav>

        <div class="mt-auto px-6">
            <div class="card-executive !p-4 flex items-center gap-3">
                <div class="w-10 h-10 rounded-full bordo-gradient flex items-center justify-center font-bold border border-white/10 bg-zinc-900">CB</div>
                <div>
                    <p class="text-xs font-black uppercase">C. BONSAH</p>
                    <p class="text-[9px] text-red-500 font-black uppercase">CEO & Founder</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- MAIN VIEW -->
    <main class="flex-grow flex flex-col overflow-hidden">
        <header class="h-24 px-12 flex items-center justify-between border-b border-white/5 bg-black/50 backdrop-blur-xl">
            <h2 id="module-title" class="text-2xl font-black italic uppercase tracking-tighter">Tableau de Bord</h2>
            <div class="flex items-center gap-6">
                <div class="text-right">
                    <p id="clock" class="text-sm font-bold">--:--</p>
                    <p class="text-[9px] text-stone-500 font-bold uppercase">Lomé, Togo</p>
                </div>
                <button class="btn-bordo px-4 py-2 text-[10px]">Paramètres</button>
            </div>
        </header>

        <div id="content-area" class="flex-grow p-12 overflow-y-auto bg-gradient-to-br from-[#050505] to-[#0a0a0a]">
            <!-- Dynamic Content -->
        </div>
    </main>

    <script>
        // CONFIG FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadModule(name) {
            const area = document.getElementById('content-area');
            const title = document.getElementById('module-title');
            
            document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
            if(event) event.currentTarget.classList.add('active');

            if(name === 'dash') {
                title.innerText = "Vue Stratégique";
                area.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        <div class="card-executive"><p class="text-[10px] uppercase font-bold text-stone-500 mb-4">Capital VIBZ</p><h3 class="text-4xl font-black italic">--- <span class="text-sm">FCFA</span></h3></div>
                        <div class="card-executive border-b-4 border-red-800"><p class="text-[10px] uppercase font-bold text-stone-500 mb-4">Candidats Tournée</p><h3 id="count-tournee" class="text-4xl font-black italic">...</h3></div>
                        <div class="card-executive"><p class="text-[10px] uppercase font-bold text-stone-500 mb-4">Missions en cours</p><h3 class="text-4xl font-black italic">07</h3></div>
                    </div>
                `;
                db.ref('registrations_tournee').on('value', s => {
                    document.getElementById('count-tournee').innerText = s.val() ? Object.keys(s.val()).length : 0;
                });
            }

            if(name === 'staff') {
                title.innerText = "Gestion du Personnel";
                area.innerHTML = `
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="card-executive">
                            <h4 class="text-xs font-black uppercase mb-8 text-red-600 tracking-[0.2em]">Outils par Poste</h4>
                            <div class="space-y-4">
                                <details class="group bg-white/5 p-4 rounded-xl cursor-pointer">
                                    <summary class="font-bold text-sm list-none flex justify-between uppercase">Assistante Exécutive <span>+</span></summary>
                                    <div class="mt-4 grid grid-cols-2 gap-2">
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">Planning Studio</button>
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">Facturation</button>
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">Base Clients</button>
                                    </div>
                                </details>
                                <details class="group bg-white/5 p-4 rounded-xl cursor-pointer">
                                    <summary class="font-bold text-sm list-none flex justify-between uppercase">Technique / Montage <span>+</span></summary>
                                    <div class="mt-4 grid grid-cols-2 gap-2">
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">État Matériel</button>
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">Serveur NAS</button>
                                        <button class="input-executive text-[10px] uppercase font-bold hover:bg-red-900/20">Rendus Vidéo</button>
                                    </div>
                                </details>
                            </div>
                        </div>
                        <div class="card-executive border-l-4 border-red-800">
                            <h4 class="text-xs font-black uppercase mb-8 text-stone-500 tracking-[0.2em]">Édition du Staff (Modifiable)</h4>
                            <div class="space-y-3">
                                <input type="text" placeholder="Nom de l'employé" class="w-full input-executive">
                                <select class="w-full input-executive bg-black">
                                    <option>Choisir le Poste</option>
                                    <option>Logistique</option>
                                    <option>Montage</option>
                                    <option>Artiste</option>
                                </select>
                                <button class="btn-bordo w-full py-4 text-xs">Mettre à jour le Personnel</button>
                            </div>
                        </div>
                    </div>
                `;
            }

            if(name === 'finance') {
                title.innerText = "Trésorerie & RH";
                area.innerHTML = `
                    <div class="card-executive mb-8">
                        <div class="flex justify-between items-center mb-8">
                            <h4 class="text-xs font-black uppercase text-stone-500 tracking-[0.2em]">Mouvements de Caisse</h4>
                            <button class="btn-bordo px-6 py-2 text-[10px]">Nouvelle Entrée</button>
                        </div>
                        <table class="w-full text-left text-sm">
                            <thead class="text-red-700 font-black uppercase text-[10px] border-b border-white/5">
                                <tr><th class="py-4">Libellé</th><th>Montant</th><th>Status</th><th>Actions</th></tr>
                            </thead>
                            <tbody class="text-stone-400">
                                <tr class="border-b border-white/5"><td class="py-4">Tournée - Étape Kara</td><td>850.000 F</td><td><span class="text-green-500">Réglé</span></td><td><button class="text-red-500 text-[10px] uppercase font-bold">Éditer</button></td></tr>
                                <tr class="border-b border-white/5"><td class="py-4">Maintenance Studio</td><td>45.000 F</td><td><span class="text-orange-500">En cours</span></td><td><button class="text-red-500 text-[10px] uppercase font-bold">Éditer</button></td></tr>
                            </tbody>
                        </table>
                    </div>
                `;
            }

            if(name === 'chat') {
                title.innerText = "Executive Chatroom";
                area.innerHTML = `
                    <div class="flex flex-col h-[65vh] glass rounded-3xl overflow-hidden">
                        <div id="chat-stream" class="flex-grow p-8 space-y-4 overflow-y-auto"></div>
                        <div class="p-6 border-t border-white/5 flex gap-4 bg-black/50">
                            <input type="text" id="chat-msg" placeholder="Message interne..." class="flex-grow input-executive">
                            <button onclick="send()" class="btn-bordo px-10">Envoyer</button>
                        </div>
                    </div>
                `;
                loadChat();
            }
        }

        function send() {
            const input = document.getElementById('chat-msg');
            if(!input.value) return;
            db.ref('internal_chat').push({ user: "CEO", msg: input.value, timestamp: Date.now() });
            input.value = "";
        }

        function loadChat() {
            db.ref('internal_chat').limitToLast(30).on('value', s => {
                const stream = document.getElementById('chat-stream');
                stream.innerHTML = "";
                if(s.val()) {
                    Object.values(s.val()).forEach(m => {
                        const isMe = m.user === "CEO";
                        stream.innerHTML += `
                            <div class="flex flex-col ${isMe ? 'items-end' : 'items-start'}">
                                <span class="text-[8px] font-black uppercase text-stone-500 mb-1">${m.user}</span>
                                <div class="px-4 py-3 rounded-2xl text-xs ${isMe ? 'bg-red-900/30 text-white border border-red-900/50 italic' : 'bg-zinc-800 text-stone-300'} max-w-md">
                                    ${m.msg}
                                </div>
                            </div>
                        `;
                    });
                    stream.scrollTop = stream.scrollHeight;
                }
            });
        }

        // Horloge
        setInterval(() => {
            const now = new Date();
            document.getElementById('clock').innerText = now.toLocaleTimeString('fr-FR', {hour: '2-digit', minute:'2-digit'});
        }, 1000);

        loadModule('dash');
    </script>
</body>
</html>
