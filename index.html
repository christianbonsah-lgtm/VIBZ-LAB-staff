<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ COMMAND | Management & Legal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;700;800&display=swap');
        :root { --bordo: #B22222; --bg: #050505; }
        body { background-color: var(--bg); color: #F4F4F5; font-family: 'Inter', sans-serif; margin: 0; }
        .btn-bordo { background: linear-gradient(135deg, var(--bordo), #7A1B1B); transition: 0.3s; color: white; font-weight: 800; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(20px); border: 1px solid rgba(255,255,255,0.05); }
        .nav-link { font-family: 'Plus Jakarta Sans'; font-size: 9px; font-weight: 800; text-transform: uppercase; cursor: pointer; padding: 25px 12px; color: #71717A; border-bottom: 3px solid transparent; }
        .nav-link.active { color: white; border-bottom: 3px solid var(--bordo); }
        .slide-title { font-family: 'Plus Jakarta Sans'; font-weight: 800; text-transform: uppercase; border-left: 8px solid var(--bordo); padding-left: 20px; font-size: 28px; }
        .tile { background: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 20px; padding: 25px; }
        .editable { cursor: pointer; transition: 0.2s; border-bottom: 1px dashed transparent; }
        .editable:hover { border-bottom-color: var(--bordo); background: rgba(255,255,255,0.02); }
        .status-pill { font-size: 8px; font-weight: 900; padding: 2px 8px; rounded: 4px; text-transform: uppercase; }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="login-screen" class="flex items-center justify-center min-h-screen px-6">
        <div class="glass p-10 rounded-3xl w-full max-w-md text-center">
            <div class="w-16 h-16 bg-[#B22222] rounded-2xl flex items-center justify-center mx-auto mb-8 font-black italic text-2xl text-white">V</div>
            <h1 class="text-2xl font-black uppercase tracking-tighter mb-8">Boardroom Login</h1>
            <input type="email" id="email" placeholder="Email pro" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-4 outline-none text-sm">
            <input type="password" id="password" placeholder="Pass" class="w-full bg-white/5 border border-white/10 p-4 rounded-xl mb-6 outline-none text-sm">
            <button onclick="login()" class="btn-bordo w-full p-4 rounded-xl text-xs uppercase tracking-widest">Initialiser Session</button>
            <p id="login-error" class="text-red-500 text-[10px] mt-4 font-bold uppercase"></p>
        </div>
    </div>

    <div id="main-app" class="hidden flex flex-col min-h-screen">
        <nav class="glass flex items-center justify-between px-6 sticky top-0 z-50">
            <div class="flex items-center gap-2">
                <div class="w-5 h-5 bg-red-800 rounded flex items-center justify-center font-black text-[9px] italic text-white">V</div>
                <span id="user-display" class="text-[8px] font-black uppercase text-stone-500">ADMIN</span>
            </div>
            <div class="flex">
                <div class="nav-link active" onclick="loadPage('dash', this)">Stratégie</div>
                <div class="nav-link" onclick="loadPage('staff', this)">Staff</div>
                <div class="nav-link" onclick="loadPage('legal', this)">Contrats</div>
                <div class="nav-link" onclick="loadPage('finance', this)">Finance</div>
                <div class="nav-link" onclick="loadPage('chat', this)">Chat</div>
            </div>
            <button onclick="logout()" class="text-[8px] font-black text-red-700 uppercase">Sortir</button>
        </nav>

        <main id="content" class="p-6 max-w-6xl mx-auto w-full"></main>
    </div>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyAyJ8tc-razxpr6x8Yp-dHLbkhhcln5O20",
            authDomain: "vibz-lab-command-center.firebaseapp.com",
            projectId: "vibz-lab-command-center",
            storageBucket: "vibz-lab-command-center.firebasestorage.app",
            messagingSenderId: "1044660724477",
            appId: "1:1044660724477:web:5140030489c152c66e9494"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();
        const db = firebase.database();

        function login() {
            const e = document.getElementById('email').value;
            const p = document.getElementById('password').value;
            auth.signInWithEmailAndPassword(e, p).catch(() => { document.getElementById('login-error').innerText = "Erreur accès"; });
        }
        function logout() { auth.signOut(); }

        auth.onAuthStateChanged(user => {
            if (user) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = user.email.split('@')[0].toUpperCase();
                loadPage('dash');
            } else {
                document.getElementById('login-screen').classList.remove('hidden');
                document.getElementById('main-app').classList.add('hidden');
            }
        });

        function loadPage(page, el) {
            if(el) { document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active')); el.classList.add('active'); }
            const c = document.getElementById('content');
            
            if(page === 'dash') {
                c.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title mb-10">Boardroom <span class="text-red-700">Analytics</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-8">
                        <div class="tile"><h3>Trésorerie Actuelle</h3><p class="text-2xl font-black mt-2 text-red-700 editable" contenteditable="true">0 FCFA</p></div>
                        <div class="tile"><h3>ROI Cible</h3><p class="text-2xl font-black mt-2 editable" contenteditable="true">0%</p></div>
                        <div class="tile"><h3>Contrats Signés</h3><p class="text-2xl font-black mt-2 text-blue-500 editable" contenteditable="true">0 / 0</p></div>
                    </div>
                </div>`;
            }

            if(page === 'staff') {
                c.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title mb-10">Membres du <span class="text-red-700">Staff</span></h2>
                    <div class="tile">
                        ${['CEO', 'DIR. ARTISTIQUE', 'TECHNIQUE', 'MONTAGE', 'LOGISTIQUE', 'COMPTA', 'ASSISTANTE'].map(r => `
                            <div class="flex justify-between items-center py-4 border-b border-white/5">
                                <span class="text-[9px] font-black text-stone-500 uppercase">${r}</span>
                                <div class="text-right">
                                    <p class="text-sm font-bold editable outline-none" contenteditable="true">NOM DU MEMBRE</p>
                                    <p class="text-[8px] text-green-600 font-bold uppercase">Actif</p>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }

            if(page === 'legal') {
                c.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title mb-10">Base <span class="text-red-700">Légale</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 mb-6 uppercase italic">Contrats Artistes</h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center p-3 bg-white/5 rounded-lg border border-white/5">
                                    <span class="text-xs font-bold editable" contenteditable="true">NOM ARTISTE 1</span>
                                    <span class="status-pill bg-yellow-900/30 text-yellow-600">En attente</span>
                                </div>
                                <button class="w-full py-3 border border-dashed border-white/20 text-[9px] uppercase font-bold">+ Ajouter un contrat artiste</button>
                            </div>
                        </div>
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 mb-6 uppercase italic">Contrats Personnel</h3>
                            <div class="space-y-4">
                                <div class="flex justify-between items-center p-3 bg-white/5 rounded-lg border border-white/5">
                                    <span class="text-xs font-bold editable" contenteditable="true">NDA GLOBAL STAFF</span>
                                    <span class="status-pill bg-green-900/30 text-green-600">Validé</span>
                                </div>
                                <button class="w-full py-3 border border-dashed border-white/20 text-[9px] uppercase font-bold">+ Nouveau contrat staff</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            }

            if(page === 'finance') {
                c.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title mb-10">Flux <span class="text-red-700">Financiers</span></h2>
                    <div class="tile p-0 overflow-hidden">
                        <table class="w-full">
                            <thead><tr><th>Désignation</th><th>Budget Prévu</th><th>Dépensé</th><th>Reste</th></tr></thead>
                            <tbody>
                                ${[1,2,3].map(i => `
                                    <tr>
                                        <td contenteditable="true" class="editable outline-none italic">Poste ${i}</td>
                                        <td contenteditable="true" class="editable outline-none">0 F</td>
                                        <td contenteditable="true" class="editable outline-none text-red-700">0 F</td>
                                        <td class="font-bold">0 F</td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }

            if(page === 'chat') {
                c.innerHTML = `
                <h2 class="slide-title mb-8 italic">Boardroom <span class="text-red-700">Chat</span></h2>
                <div class="glass rounded-3xl h-[60vh] flex flex-col overflow-hidden">
                    <div id="c-box" class="flex-grow p-6 overflow-y-auto space-y-4"></div>
                    <div class="p-4 bg-black/40 border-t border-white/5 flex gap-2">
                        <input type="text" id="c-in" placeholder="Message..." class="flex-grow bg-white/5 border border-white/10 p-3 rounded-xl text-sm outline-none">
                        <button onclick="send()" class="btn-bordo px-6 rounded-xl font-black text-[10px] uppercase">OK</button>
                    </div>
                </div>`;
                syncChat();
            }
        }

        function send() {
            const input = document.getElementById('c-in');
            if(!input.value || !auth.currentUser) return;
            db.ref('boardroom_chat').push({ 
                u: auth.currentUser.email.split('@')[0].toUpperCase(), 
                m: input.value, 
                t: firebase.database.ServerValue.TIMESTAMP 
            }).then(() => { input.value = ""; });
        }

        function syncChat() {
            db.ref('boardroom_chat').limitToLast(15).on('value', s => {
                const box = document.getElementById('c-box');
                if(!box) return;
                box.innerHTML = "";
                const data = s.val();
                if(data){
                    Object.values(data).forEach(m => {
                        const isMe = m.u === auth.currentUser.email.split('@')[0].toUpperCase();
                        box.innerHTML += `<div class="flex flex-col ${isMe ? 'items-end' : 'items-start'} mb-2">
                            <span class="text-[7px] font-black uppercase text-stone-600 mb-1">${m.u}</span>
                            <div class="p-3 rounded-xl text-xs ${isMe ? 'bg-red-900/20 text-white border border-red-900/40' : 'bg-white/5 text-stone-400'} max-w-[80%]">${m.m}</div>
                        </div>`;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }
    </script>
</body>
</html>
