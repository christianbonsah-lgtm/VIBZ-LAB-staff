<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ LAB | Executive Command Center</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap');
        
        :root {
            --primary: #EF4444;
            --primary-dark: #7F1D1D;
            --bg-deep: #09090B;
            --glass: rgba(18, 18, 21, 0.7);
        }

        body {
            background-color: var(--bg-deep);
            color: #FAFAFA;
            font-family: 'Plus Jakarta Sans', sans-serif;
            height: 100vh;
            overflow: hidden;
        }

        /* Effet Glassmorphism Premium */
        .glass-panel {
            background: var(--glass);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 50px rgba(0, 0, 0, 0.5);
        }

        /* Scrollbar Moderne */
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #27272A; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--primary); }

        /* Animations */
        .active-tab {
            color: var(--primary) !important;
            border-bottom: 2px solid var(--primary);
        }

        .red-glow:hover {
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.3);
            border-color: var(--primary);
        }

        .page-transition { opacity: 0; transform: translateY(10px); }
        
        /* Mobile Sidebar Overlay */
        #sidebar { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
    </style>
</head>
<body class="flex flex-col md:flex-row">

    <div id="loader" class="fixed inset-0 z-[100] bg-black flex items-center justify-center">
        <div class="text-center">
            <div class="w-12 h-12 border-4 border-red-600 border-t-transparent rounded-full animate-spin mb-4 mx-auto"></div>
            <p class="text-[10px] font-black uppercase tracking-[0.5em] text-red-600">Vibz Command System</p>
        </div>
    </div>

    <aside id="sidebar" class="w-full md:w-80 h-screen glass-panel flex flex-col shrink-0 z-40 fixed md:relative -translate-x-full md:translate-x-0">
        <div class="p-8">
            <div class="flex items-center gap-3 mb-10">
                <div class="w-10 h-10 bg-red-600 rounded-xl flex items-center justify-center shadow-lg shadow-red-900/40">
                    <i data-lucide="zap" class="text-white w-6"></i>
                </div>
                <div>
                    <h1 class="text-lg font-black tracking-tighter leading-none">VIBZ LAB</h1>
                    <span class="text-[8px] font-bold text-zinc-500 uppercase tracking-widest">Executive Center</span>
                </div>
            </div>

            <div class="relative mb-8 group">
                <i data-lucide="search" class="absolute left-3 top-3 w-4 text-zinc-500 group-focus-within:text-red-500 transition-colors"></i>
                <input type="text" placeholder="Rechercher..." class="w-full bg-zinc-900/50 border border-zinc-800 p-3 pl-10 rounded-xl text-xs outline-none focus:ring-1 ring-red-500/50 transition-all">
            </div>

            <h3 class="text-[10px] font-black text-zinc-600 uppercase tracking-widest mb-4 px-2">Discussions</h3>
            <div class="space-y-1 overflow-y-auto max-h-[50vh] no-scrollbar">
                <div class="flex items-center justify-between p-4 rounded-xl bg-white/5 border border-white/5 cursor-pointer hover:bg-white/10 transition-all border-l-4 border-l-red-600">
                    <div class="flex items-center gap-3">
                        <div class="relative">
                            <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Admin" class="w-8 h-8 rounded-lg">
                            <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-zinc-900 rounded-full"></div>
                        </div>
                        <div>
                            <p class="text-xs font-bold">Boardroom Live</p>
                            <p class="text-[10px] text-zinc-500">7 membres actifs</p>
                        </div>
                    </div>
                </div>
                </div>
        </div>
        
        <div class="mt-auto p-6 border-t border-zinc-800">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-zinc-900/50">
                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Christian" class="w-10 h-10 rounded-full border border-zinc-700">
                <div class="flex-grow">
                    <p class="text-xs font-bold uppercase" id="username">C. Bonsah</p>
                    <p class="text-[9px] text-red-500 font-bold uppercase italic">CEO & Founder</p>
                </div>
                <i data-lucide="settings" class="w-4 text-zinc-500 cursor-pointer hover:text-white"></i>
            </div>
        </div>
    </aside>

    <main class="flex-grow flex flex-col min-w-0">
        <header class="h-20 glass-panel flex items-center justify-between px-8 border-t-0 border-x-0 shrink-0">
            <div class="flex items-center gap-8" id="nav-tabs">
                <button onclick="changePage('chat')" class="nav-link active-tab text-[11px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition-all">Command</button>
                <button onclick="changePage('staff')" class="nav-link text-[11px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition-all">Personnel</button>
                <button onclick="changePage('finance')" class="nav-link text-[11px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition-all">Trésorerie</button>
                <button onclick="changePage('legal')" class="nav-link text-[11px] font-black uppercase tracking-widest text-zinc-400 hover:text-white transition-all">Legal</button>
            </div>
            
            <div class="flex items-center gap-4">
                <div class="hidden md:flex flex-col items-end">
                    <span id="current-date" class="text-[9px] font-black text-zinc-500 uppercase tracking-widest">13 MAI 2026</span>
                    <span id="real-time" class="text-xs font-bold text-red-500 tracking-widest">07:52:14</span>
                </div>
                <div class="w-[1px] h-8 bg-zinc-800 mx-2"></div>
                <button class="relative p-2 text-zinc-400 hover:text-white">
                    <i data-lucide="bell" class="w-5"></i>
                    <span class="absolute top-1 right-1 w-2 h-2 bg-red-600 rounded-full border-2 border-zinc-900"></span>
                </button>
            </div>
        </header>

        <div id="app-viewport" class="flex-grow overflow-hidden relative">
            </div>
    </main>

    <script>
        // CONFIGURATION FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyAyJ8tc-razxpr6x8Yp-dHLbkhhcln5O20",
            authDomain: "vibz-lab-command-center.firebaseapp.com",
            projectId: "vibz-lab-command-center",
            databaseURL: "https://vibz-lab-command-center-default-rtdb.firebaseio.com/",
            appId: "1:1044660724477:web:5140030489c152c66e9494"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // ÉTAT DE L'APPLICATION
        const AppState = {
            currentPage: 'chat',
            user: { name: 'Christian B.', role: 'CEO' },
            messages: []
        };

        // RENDU DES PAGES
        const Pages = {
            chat: `
                <div class="h-full flex flex-col p-6 page-transition">
                    <div class="flex-grow glass-panel rounded-3xl overflow-hidden flex flex-col border border-white/5">
                        <div id="chat-messages" class="flex-grow p-8 overflow-y-auto space-y-6 no-scrollbar bg-black/20"></div>
                        <div class="p-6 bg-zinc-900/80 border-t border-white/5">
                            <div class="flex gap-4 items-center max-w-5xl mx-auto">
                                <button class="p-3 bg-zinc-800 rounded-xl text-zinc-400 hover:text-white transition-all"><i data-lucide="plus" class="w-5"></i></button>
                                <input type="text" id="msg-input" placeholder="Écrire une directive exécutive..." class="flex-grow bg-transparent text-sm outline-none border-none">
                                <button onclick="sendMessage()" class="bg-red-600 px-8 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest shadow-lg shadow-red-900/20 active:scale-95 transition-all">Envoyer</button>
                            </div>
                        </div>
                    </div>
                </div>`,
            staff: `
                <div class="p-8 h-full overflow-y-auto page-transition">
                    <div class="flex justify-between items-end mb-10">
                        <div>
                            <h2 class="text-3xl font-black uppercase italic tracking-tighter">Équipage <span class="text-red-600">VIBZ</span></h2>
                            <p class="text-zinc-500 text-xs font-bold uppercase tracking-widest mt-2">7 Collaborateurs actifs sur le projet</p>
                        </div>
                        <button class="bg-red-600/10 border border-red-600/30 text-red-500 px-6 py-2 rounded-xl text-[10px] font-black uppercase tracking-widest hover:bg-red-600 hover:text-white transition-all">+ Recruter</button>
                    </div>
                    <div class="grid grid-cols-1 lg:grid-cols-2 xl:grid-cols-3 gap-6">
                        ${['Direction', 'Montage', 'Logistique', 'Technique', 'Comptabilité', 'Artistique', 'Assistante'].map(role => `
                            <div class="glass-panel p-6 rounded-2xl red-glow transition-all group">
                                <div class="flex items-center gap-4">
                                    <div class="relative">
                                        <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${role}" class="w-14 h-14 rounded-2xl bg-zinc-800">
                                        <div class="absolute -top-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-4 border-zinc-900"></div>
                                    </div>
                                    <div class="flex-grow">
                                        <p class="text-[9px] font-black text-red-600 uppercase tracking-widest">${role}</p>
                                        <p class="text-sm font-bold">Membre du Lab</p>
                                        <p class="text-[10px] text-zinc-500">Dernière activité: 2min</p>
                                    </div>
                                    <button class="opacity-0 group-hover:opacity-100 p-2 bg-white/5 rounded-lg transition-all"><i data-lucide="message-square" class="w-4 text-zinc-400"></i></button>
                                </div>
                            </div>
                        `).join('')}
                    </div>
                </div>`,
            finance: `
                <div class="p-8 h-full overflow-y-auto page-transition">
                    <h2 class="text-3xl font-black uppercase italic mb-10">Tableau de <span class="text-red-600">Bord Financier</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-4 gap-6 mb-10">
                        <div class="glass-panel p-6 rounded-3xl border-l-4 border-red-600">
                            <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Trésorerie</p>
                            <p class="text-2xl font-black italic">4.250.000 <span class="text-xs font-normal text-zinc-400">FCFA</span></p>
                        </div>
                        <div class="glass-panel p-6 rounded-3xl">
                            <p class="text-[10px] font-black text-zinc-500 uppercase tracking-widest mb-2">Dépenses Mois</p>
                            <p class="text-2xl font-black italic">840.000 <span class="text-xs font-normal text-zinc-400">FCFA</span></p>
                        </div>
                        </div>
                    <div class="glass-panel p-8 rounded-[40px] border border-white/5">
                        <canvas id="financeChart" class="w-full h-64"></canvas>
                    </div>
                </div>`
        };

        // MOTEUR DE NAVIGATION
        function changePage(page) {
            AppState.currentPage = page;
            const viewport = document.getElementById('app-viewport');
            
            // Mise à jour visuelle des onglets
            document.querySelectorAll('.nav-link').forEach(btn => {
                btn.classList.remove('active-tab');
                if(btn.innerText.toLowerCase().includes(page.slice(0,3))) btn.classList.add('active-tab');
            });

            // Transition cinématique
            gsap.to(viewport, { opacity: 0, y: 5, duration: 0.2, onComplete: () => {
                viewport.innerHTML = Pages[page];
                lucide.createIcons();
                gsap.to(viewport, { opacity: 1, y: 0, duration: 0.4 });
                
                if(page === 'chat') listenToMessages();
                if(page === 'finance') renderChart();
            }});
        }

        // SYSTÈME DE CHAT TEMPS RÉEL
        function sendMessage() {
            const input = document.getElementById('msg-input');
            if(!input.value) return;

            db.ref('boardroom_chat').push({
                user: AppState.user.name,
                role: AppState.user.role,
                text: input.value,
                time: Date.now()
            });
            input.value = "";
        }

        function listenToMessages() {
            db.ref('boardroom_chat').limitToLast(30).on('value', snap => {
                const box = document.getElementById('chat-messages');
                if(!box) return;
                box.innerHTML = "";
                const data = snap.val();
                if(data) {
                    Object.values(data).forEach(msg => {
                        const isMe = msg.user === AppState.user.name;
                        box.innerHTML += `
                            <div class="flex gap-4 ${isMe ? 'flex-row-reverse' : ''} animate-fade">
                                <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=${msg.user}" class="w-10 h-10 rounded-xl bg-zinc-800 shrink-0">
                                <div class="max-w-[70%]">
                                    <div class="flex items-center gap-2 mb-1 ${isMe ? 'flex-row-reverse' : ''}">
                                        <span class="text-[9px] font-black uppercase tracking-widest ${isMe ? 'text-red-500' : 'text-zinc-500'}">${msg.user}</span>
                                        <span class="text-[8px] text-zinc-700 font-bold">${new Date(msg.time).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</span>
                                    </div>
                                    <div class="p-4 rounded-2xl text-xs leading-relaxed ${isMe ? 'bg-red-600/20 text-white border border-red-600/30 italic' : 'bg-zinc-800 text-zinc-300'}">
                                        ${msg.text}
                                    </div>
                                </div>
                            </div>
                        `;
                    });
                    box.scrollTop = box.scrollHeight;
                }
            });
        }

        // GRAPHES FINANCIERS
        function renderChart() {
            const ctx = document.getElementById('financeChart').getContext('2d');
            new Chart(ctx, {
                type: 'line',
                data: {
                    labels: ['Jan', 'Fév', 'Mar', 'Avr', 'Mai'],
                    datasets: [{
                        label: 'Croissance VIBZ LAB',
                        data: [12, 19, 15, 25, 45],
                        borderColor: '#EF4444',
                        tension: 0.4,
                        fill: true,
                        backgroundColor: 'rgba(239, 68, 68, 0.05)'
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: { 
                        y: { display: false },
                        x: { ticks: { color: '#52525B', font: { size: 10, weight: 'bold' } }, grid: { display: false } }
                    }
                }
            });
        }

        // INITIALISATION
        window.onload = () => {
            lucide.createIcons();
            setTimeout(() => {
                gsap.to('#loader', { opacity: 0, duration: 0.8, onComplete: () => {
                    document.getElementById('loader').remove();
                    changePage('chat');
                }});
            }, 1500);

            // Horloge Temps Réel
            setInterval(() => {
                document.getElementById('real-time').innerText = new Date().toLocaleTimeString('fr-FR', {hour12: false});
            }, 1000);
        };

        // Gérer Entrée dans le chat
        document.addEventListener('keypress', (e) => {
            if(e.key === 'Enter' && AppState.currentPage === 'chat') sendMessage();
        });
    </script>
</body>
</html>
