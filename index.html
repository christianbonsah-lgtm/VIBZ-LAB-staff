<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VIBZ COMMAND | Executive Full-Editable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;700;800&family=Inter:wght@300;400;600&display=swap');
        
        :root { --bordo: #B22222; --bg: #050505; }
        body { background-color: var(--bg); color: #F4F4F5; font-family: 'Inter', sans-serif; margin: 0; background-image: radial-gradient(circle at 20% 20%, rgba(178, 34, 34, 0.05) 0%, transparent 40%); }

        .nav-link { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 11px; font-weight: 800; letter-spacing: 2px; text-transform: uppercase; color: #71717A; padding: 25px 20px; transition: 0.3s; cursor: pointer; border-bottom: 3px solid transparent; }
        .nav-link.active { color: white; border-bottom: 3px solid var(--bordo); }

        .slide-title { font-family: 'Plus Jakarta Sans', sans-serif; font-size: 42px; font-weight: 800; text-transform: uppercase; border-left: 8px solid var(--bordo); padding-left: 25px; margin-bottom: 40px; }
        .tile { background-color: #0A0A0A; border: 1px solid #1A1A1A; border-radius: 20px; padding: 35px; }
        .accent { color: var(--bordo); }
        
        .editable-field:focus { background: rgba(178, 34, 34, 0.1); outline: none; border-bottom: 1px solid var(--bordo); }
        .btn-mod { border: 1px solid #333; border-radius: 4px; color: #555; font-size: 9px; padding: 4px 8px; text-transform: uppercase; font-weight: 800; cursor: pointer; }
        .btn-mod:hover { color: var(--bordo); border-color: var(--bordo); }

        /* Graphique SVG */
        .chart-path { stroke-dasharray: 1000; stroke-dashoffset: 1000; animation: draw 2s forwards ease-in-out; }
        @keyframes draw { to { stroke-dashoffset: 0; } }
    </style>
</head>
<body>

    <nav class="sticky top-0 bg-black/80 backdrop-blur-xl border-b border-white/5 flex items-center justify-between px-12 z-50">
        <div class="flex items-center gap-4">
            <div class="w-8 h-8 bg-[#B22222] rounded flex items-center justify-center font-black text-white italic">V</div>
            <span class="text-[10px] font-black uppercase tracking-widest">Vibz Command</span>
        </div>
        <div class="flex">
            <div class="nav-link active" onclick="loadPage('dash', this)">Stratégie</div>
            <div class="nav-link" onclick="loadPage('staff', this)">Staff</div>
            <div class="nav-link" onclick="loadPage('finance', this)">Finances</div>
            <div class="nav-link" onclick="loadPage('tournee', this)">Tournée</div>
        </div>
        <div class="text-[10px] font-bold text-stone-500 uppercase tracking-widest">CEO Session</div>
    </nav>

    <main id="view-container" class="max-w-7xl mx-auto py-16 px-6"></main>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCaKG3bQcenE4yyGPzHoUEwr9lJ6OAssXQ",
            authDomain: "vibz-lab.firebaseapp.com",
            databaseURL: "https://vibz-lab-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "vibz-lab",
            storageBucket: "vibz-lab.firebasestorage.app",
            messagingSenderId: "39630575995",
            appId: "1:39630575995:web:da457e123e2cb54274c5de"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function loadPage(page, el) {
            const container = document.getElementById('view-container');
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            if(el) el.classList.add('active');

            if(page === 'dash') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Projections de <span class="accent">Performance</span></h2>
                    
                    <div class="grid grid-cols-1 md:grid-cols-3 gap-8 mb-12">
                        <div class="tile">
                            <div class="flex justify-between items-start">
                                <h3 class="text-xs font-bold text-stone-500 uppercase">Trésorerie</h3>
                                <button class="btn-mod" onclick="editVal('tresor')">Modifier</button>
                            </div>
                            <p id="tresor" contenteditable="false" class="editable-field text-3xl font-black mt-4 accent">4.250.000 FCFA</p>
                        </div>
                        <div class="tile">
                            <h3 class="text-xs font-bold text-stone-500 uppercase">Inscrits Tournée</h3>
                            <p id="t-count" class="text-3xl font-black mt-4 italic text-white">...</p>
                        </div>
                        <div class="tile">
                            <div class="flex justify-between items-start">
                                <h3 class="text-xs font-bold text-stone-500 uppercase">ROI Prévu</h3>
                                <button class="btn-mod" onclick="editVal('roi')">Modifier</button>
                            </div>
                            <p id="roi" contenteditable="false" class="editable-field text-3xl font-black mt-4 italic">+45%</p>
                        </div>
                    </div>

                    <div class="tile">
                        <h3 class="text-xs font-black text-stone-500 uppercase mb-8 italic">Courbe de Croissance Digitalisée</h3>
                        <svg viewBox="0 0 1000 300" class="w-full h-64">
                            <defs>
                                <linearGradient id="grad" x1="0%" y1="0%" x2="0%" y2="100%">
                                    <stop offset="0%" style="stop-color:#B22222; stop-opacity:0.4" />
                                    <stop offset="100%" style="stop-color:#B22222; stop-opacity:0" />
                                </linearGradient>
                            </defs>
                            <path fill="url(#grad)" d="M0,280 L200,240 L400,180 L600,120 L800,60 L1000,30 L1000,300 L0,300 Z" />
                            <polyline class="chart-path" fill="none" stroke="#B22222" stroke-width="5" points="0,280 200,240 400,180 600,120 800,60 1000,30" />
                            <g fill="#555" font-size="10" font-weight="bold" text-transform="uppercase">
                                <text x="10" y="295">Q1 Launch</text>
                                <text x="400" y="295">Q2 Tournée</text>
                                <text x="850" y="295">Q4 Expansion</text>
                            </g>
                        </svg>
                    </div>
                </div>`;
                db.ref('registrations_tournee').on('value', s => {
                    document.getElementById('t-count').innerText = s.val() ? Object.keys(s.val()).length : 0;
                });
            }

            if(page === 'staff') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Infrastructure <span class="accent">RH</span></h2>
                    <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 uppercase mb-6 italic">Les 7 Piliers</h3>
                            <div id="staff-list">
                                ${['CEO', 'Assistante Ex.', 'Dir Artistique', 'Montage', 'Technique', 'Logistique', 'Comptable'].map((r, i) => `
                                    <div class="flex justify-between items-center py-4 border-b border-white/5">
                                        <div>
                                            <span id="role-${i}" class="text-[10px] text-red-700 font-black uppercase">${r}</span>
                                            <p id="name-${i}" contenteditable="false" class="editable-field text-sm font-bold uppercase block">Nom du membre</p>
                                        </div>
                                        <button class="btn-mod" onclick="editVal('name-${i}')">Éditer</button>
                                    </div>
                                `).join('')}
                            </div>
                        </div>
                        <div class="tile">
                            <h3 class="text-xs font-black text-stone-500 uppercase mb-6 italic">Outils Nécessaires</h3>
                            <textarea class="w-full bg-white/5 border border-white/10 p-4 rounded-xl text-xs h-64 outline-none italic" placeholder="Lister les outils par poste ici..."></textarea>
                        </div>
                    </div>
                </div>`;
            }

            if(page === 'finance') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Trésorerie <span class="accent">Éditable</span></h2>
                    <div class="tile p-0 overflow-hidden">
                        <table class="w-full">
                            <thead><tr><th>Poste de dépense</th><th>Budget Prévu</th><th>Réel</th><th>Action</th></tr></thead>
                            <tbody>
                                ${['Tournée Découverte', 'Production Podcast', 'Staff & Salaires'].map((item, i) => `
                                    <tr>
                                        <td id="f-item-${i}" contenteditable="false" class="editable-field font-bold italic uppercase text-xs">${item}</td>
                                        <td id="f-bp-${i}" contenteditable="false" class="editable-field">4.5M F</td>
                                        <td id="f-r-${i}" contenteditable="false" class="editable-field text-red-600 font-black">--- F</td>
                                        <td><button class="btn-mod" onclick="editVal('f-item-${i}')">Modifier</button></td>
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                    </div>
                </div>`;
            }

            if(page === 'tournee') {
                container.innerHTML = `
                <div class="animate-fade">
                    <h2 class="slide-title">Flux <span class="accent">Logistique</span></h2>
                    <div class="flex justify-between mt-20 relative">
                        <div class="absolute w-full h-[4px] bg-white/5 top-[10px]"></div>
                        ${['Sotouboua', 'Sokodé', 'Kara', 'Mango', 'Dapaong'].map((v, i) => `
                            <div class="z-10 text-center">
                                <div class="w-5 h-5 bg-[#B22222] rounded-full mx-auto mb-4 border-4 border-black"></div>
                                <p id="city-${i}" contenteditable="false" class="editable-field text-xs font-black uppercase italic">${v}</p>
                                <button class="btn-mod mt-4" onclick="editVal('city-${i}')">Éditer</button>
                            </div>
                        `).join('')}
                    </div>
                </div>`;
            }
        }

        // FONCTION DE MODIFICATION UNIVERSELLE
        function editVal(id) {
            const el = document.getElementById(id);
            const isEditing = el.getAttribute('contenteditable') === 'true';
            
            if (isEditing) {
                el.setAttribute('contenteditable', 'false');
                el.style.border = "none";
                event.target.innerText = "Modifier";
                // Ici tu pourrais ajouter une fonction db.ref(...).update(...) pour sauvegarder
            } else {
                el.setAttribute('contenteditable', 'true');
                el.focus();
                el.style.borderBottom = "1px solid #B22222";
                event.target.innerText = "OK";
            }
        }

        loadPage('dash');
    </script>
</body>
</html>
